<div class="items-grid">
    <div [style.visibility]="isLoading() ? 'hidden' : 'visible'" style="display: contents;">
        @for (cocktail of cocktails(); track cocktail.id) {
        <app-card [item]="cocktail"></app-card>
        }
    </div>
</div>
@if (!isLoading() && (cocktails().length === 0 || !searchQueryValue()?.trim())) {
<div class="empty-state">
    <p>Type a cocktail name in the search bar and press Enter to discover cocktails!</p>
</div>
}
