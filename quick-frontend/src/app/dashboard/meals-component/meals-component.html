@if (!isLoading() && (meals().length === 0 || !searchQueryValue()?.trim())) {
<div class="empty-state">
    <p>Type a dish name in the search bar and press Enter to discover meals!</p>
</div>
}

<div class="items-grid">
    <div [style.visibility]="isLoading() ? 'hidden' : 'visible'" style="display: contents;">
        @for (meal of meals(); track meal.id) {
        <app-card [item]="meal"></app-card>
        }
    </div>
</div>
