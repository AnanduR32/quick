<nav class="navbar">
    <!-- Menu Items List -->
    <ul class="nav-links">
        @for (item of navItems; track item.path) {
        <li>
            <a [routerLink]="item.path" routerLinkActive="active-tab"
                [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }">
                {{ item.label }}
            </a>
        </li>
        }
    </ul>
    <app-search />

</nav>
